<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' pet-model:; style-src 'self'; script-src 'self' 'wasm-unsafe-eval'; img-src 'self' pet-model: data: blob:; connect-src 'self' pet-model:; media-src 'self' pet-model:"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>桌宠</title>
    <link rel="stylesheet" href="./pet.css" />
  </head>
  <body>
    <main class="pet-stage">
      <section class="pet-area" aria-label="桌宠交互区域">
        <!-- 屏幕感知等回应时由脚本显示气泡 -->
        <p class="speech" hidden></p>
        <div class="pet-shell">
          <div class="pet" role="img" aria-label="Live2D 实验角色">
            <canvas id="live2d-canvas"></canvas>
            <p class="live2d-status">正在加载 Live2D…</p>
          </div>
        </div>
        <p class="hint" hidden>拖动移动 · 右键开关设置</p>
      </section>
    </main>
    <script src="./vendor/live2dcubismcore.min.js"></script>
    <script src="./vendor/pixi-6.5.10.min.js"></script>
    <script src="./vendor/pixi-unsafe-eval-6.5.10.min.js"></script>
    <script src="./vendor/pixi-live2d-display-0.4.0.min.js"></script>
    <script src="./speech-layout.js"></script>
    <script src="./live2d/live2d-viewer.js"></script>
    <script src="./pet.js"></script>
  </body>
</html>
